---
working_dir: ./docker/gladius
auto_discovery:
  enabled: true
  depth: 1
  delete: true
external_secrets:
  OVH_APPLICATION_KEY: op://Services/OVHcloud/API Keys/traefik-application-key
  OVH_APPLICATION_SECRET: op://Services/OVHcloud/API Keys/traefik-application-secret
  OVH_CONSUMER_KEY: op://Services/OVHcloud/API Keys/traefik-consumer-key
  GARAGE_ADMIN_KEY: op://Services/Garage/admin_key
  GARAGE_RPC_SECRET: op://Services/Garage/rpc_secret
force_recreate: false
reconciliation:
  enabled: true
  interval: 3600
