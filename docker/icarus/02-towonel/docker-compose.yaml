---
name: tunnel

services:
  towonel-hub:
    container_name: towonel-hub
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    environment:
      RUST_LOG: info
      TOWONEL_INVITE_HASH_KEY: ${TOWONEL_INVITE_HASH_KEY}
      TOWONEL_HUB_PUBLIC_URL: https://twnl.bjw-s.dev
      # Edge DNS differs from hub DNS, so override the derived default:
      TOWONEL_EDGE_ADVERTISED_ADDRESSES: tunnel.bjw-s.dev:443
      # Behind a reverse proxy on :443 — these stay non-default:
      TOWONEL_EDGE_HEALTH_LISTEN_ADDR: 0.0.0.0:9092
      TOWONEL_EDGE_IROH_PORT: "51820"
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:4443
      TOWONEL_EDGE_PROXY_PROTOCOL: "true"
    expose:
      - "4443"
      - "8443"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "-o"
        - "/dev/null"
        - "http://127.0.0.1:8443/v1/health"
      interval: 30s
      timeout: 5s
      start_period: 30s
    # renovate: datasource=docker depName=codeberg.org/towonel/towonel-node
    image: codeberg.org/towonel/towonel-node:0.1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 22:22
      - "51820:51820/udp"
    restart: unless-stopped
    user: "10001:10001"
    volumes:
      - /opt/towonel:/data

networks:
  default:
    name: edge
    external: true
