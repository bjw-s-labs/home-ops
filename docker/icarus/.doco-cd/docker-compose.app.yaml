---
# This file is not managed by doco-cd because it can't manage itself

secrets:
  1pw_token:
    file: /opt/doco-cd/1pw_token
  api_secret:
    file: /opt/doco-cd/api_secret
  webhook_secret:
    file: /opt/doco-cd/webhook_secret
services:
  app:
    container_name: doco-cd
    environment:
      API_SECRET_FILE: /run/secrets/api_secret
      DEPLOY_CONFIG_BASE_DIR: ./docker/icarus/
      HTTP_PORT: 8880
      LOG_LEVEL: info
      POLL_CONFIG: |-
        - url: https://github.com/bjw-s-labs/home-ops.git
          reference: main
          interval: 3600
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token
      TZ: Europe/Amsterdam
      WEBHOOK_SECRET_FILE: /run/secrets/webhook_secret
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
    image: ghcr.io/kimdre/doco-cd:0.89.2@sha256:41a0de35597033d49326042de1e8e91e0ef48eefb445597ace1f82946d2009cd
    restart: unless-stopped
    secrets:
      - 1pw_token
      - api_secret
      - webhook_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
volumes:
  data: {}
networks:
  default:
    name: edge
    external: true
