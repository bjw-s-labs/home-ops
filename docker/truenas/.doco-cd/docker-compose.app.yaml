---
# This file is not managed by doco-cd because it can't manage itself

secrets:
  1pw_token:
    file: /home/truenas_admin/.config/doco-cd/1pw_token
services:
  app:
    container_name: doco-cd
    environment:
      DEPLOY_CONFIG_BASE_DIR: ./docker/truenas/
      LOG_LEVEL: info
      POLL_CONFIG: |-
        - url: https://github.com/bjw-s-labs/home-ops.git
          reference: refs/heads/main
          interval: 3600
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token
      TZ: Europe/Amsterdam
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
    image: ghcr.io/kimdre/doco-cd:0.74.0@sha256:e4bdfd979dcd8a4c219609fdeae10917283bb4ab2ca3b5dcd95a1acbde9562e8
    restart: unless-stopped
    secrets:
      - 1pw_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
volumes:
  data: {}
