---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kguardian
spec:
  chartRef:
    kind: OCIRepository
    name: kguardian
  interval: 30m
  values:
    controller:
      excludedNamespaces:
        - kguardian
    mcpServer:
      enabled: true
      image:
        repository: ghcr.io/kguardian-dev/kguardian/mcp-server
        tag: 1.5.0
