---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanafolder_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: cilium
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  title: Cilium
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cilium
spec:
  allowCrossNamespaceImport: true
  configMapRef:
    name: cilium-dashboard
    key: cilium-dashboard.json
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: cilium
  instanceSelector:
    matchLabels:
      dashboards: grafana
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cilium-operator
spec:
  allowCrossNamespaceImport: true
  configMapRef:
    name: cilium-operator-dashboard
    key: cilium-operator-dashboard.json
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: cilium
  instanceSelector:
    matchLabels:
      dashboards: grafana
