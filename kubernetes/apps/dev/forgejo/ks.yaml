---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
spec:
  components:
    - ../../../../components/anubis
    - ../../../../components/dragonfly
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: kopiur
      namespace: system
    - name: dragonfly-operator
      namespace: database
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  interval: 1h
  path: "./kubernetes/apps/dev/forgejo/app"
  postBuild:
    substitute:
      APP: forgejo
      KOPIUR_MOVER_UID: "1000"
      KOPIUR_MOVER_GID: "1000"
      KOPIUR_CAPACITY: 10Gi
      ANUBIS_TARGET: http://forgejo-http.dev.svc.cluster.local:3000
      ANUBIS_MEM_LIMIT: 384Mi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: dev
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  path: "./kubernetes/apps/dev/forgejo/runner"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: dev
