---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./certificate.yaml
  - ./envoy.yaml
  - ./external.yaml
  - ./https-redirect.yaml
  - ./internal.yaml
  - ./podmonitor.yaml
configMapGenerator:
  - name: envoy-external-extensions
    files:
      - resources/block-user-agents.lua
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
