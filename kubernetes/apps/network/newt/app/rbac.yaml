---
# TODO: remove once https://github.com/fosrl/helm-charts/pull/XX (extraRules support) is merged
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: newt-httproute-reader
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - newt-sidecar.home-operations.com
    resources:
      - privateresources
      - publicresources
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: newt-httproute-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: newt-httproute-reader
subjects:
  - kind: ServiceAccount
    name: newt
    namespace: network
