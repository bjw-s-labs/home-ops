---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pangolin-operator
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: pangolin-operator-secret
    creationPolicy: Owner
    template:
      data:
        PANGOLIN_API_URL: "{{ .pangolin_api_url }}"
        PANGOLIN_API_KEY: "{{ .pangolin_api_key }}"
        PANGOLIN_ENDPOINT: "{{ .pangolin_hostname }}"
        PANGOLIN_ORG_ID: "{{ .pangolin_org_id }}"
  dataFrom:
    - extract:
        key: Pangolin
      rewrite:
        - regexp:
            source: "[^a-zA-Z0-9-]"
            target: "_"
        - regexp:
            source: "(.*)"
            target: "pangolin_$1"
