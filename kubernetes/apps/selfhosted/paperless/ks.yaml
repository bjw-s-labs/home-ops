---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  components:
    - ../../../../components/volsync
    - ../../../../components/kopiur
    - ../../../../components/zeroscaler
    - ../../../../components/dragonfly
  dependsOn:
    - name: volsync
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/selfhosted/paperless/app"
  postBuild:
    substitute:
      APP: paperless
      VOLSYNC_CLAIM: paperless-data
      KOPIUR_CLAIM: paperless-data
      VOLSYNC_CAPACITY: 15Gi
      KOPIUR_CAPACITY: 15Gi
      KOPIUR_MOVER_UID: "1000"
      KOPIUR_MOVER_GID: "65542"
      DRAGONFLY_REPLICAS: "1"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
