---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wotcher
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: wotcher
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: volsync
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/selfhosted/wotcher/app"
  postBuild:
    substitute:
      APP: wotcher
      VOLSYNC_CLAIM: wotcher
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
