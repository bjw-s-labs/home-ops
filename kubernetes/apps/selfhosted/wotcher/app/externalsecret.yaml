---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wotcher
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: wotcher-secret
    creationPolicy: Owner
    template:
      data:
        WOTCHER_GITHUB_TOKEN: "{{ .github_pat_wotcher }}"
        WOTCHER_DISCORD_BOT_TOKEN: "{{ .wotcher_discord_bot_token }}"
  dataFrom:
    - extract:
        key: Github
      rewrite:
        - regexp:
            source: "(.*)"
            target: "github_$1"
    - extract:
        key: wotcher
      rewrite:
        - regexp:
            source: "(.*)"
            target: "wotcher_$1"
