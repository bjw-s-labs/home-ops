---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: manyfold
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: manyfold
      app.kubernetes.io/instance: manyfold
      app.kubernetes.io/controller: manyfold
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: network
            gateway.networking.k8s.io/gateway-name: envoy-internal
      toPorts:
        - ports:
            - port: "3214"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app: manyfold-dragonfly
            app.kubernetes.io/name: dragonfly
            app.kubernetes.io/part-of: dragonfly
