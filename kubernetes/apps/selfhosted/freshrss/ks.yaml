---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: freshrss
spec:
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: kopiur
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/selfhosted/freshrss/app"
  postBuild:
    substitute:
      APP: freshrss
      KOPIUR_CAPACITY: 2Gi
      KOPIUR_MOVER_UID: "0"
      KOPIUR_MOVER_GID: "82"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
