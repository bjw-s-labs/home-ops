---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  chartRef:
    kind: OCIRepository
    name: openebs
  interval: 30m
  values:
    analytics:
      enabled: false
    alloy:
      enabled: false
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: true
      replicated:
        mayastor:
          enabled: false
    localpv-provisioner:
      helperPod:
        image:
          registry: quay.io/
      hostpathClass:
        enabled: true
        name: openebs-hostpath
        isDefaultClass: false
      localpv:
        replicas: 1
        image:
          registry: quay.io/
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            memory: 128Mi
      rbac:
        create: true
    zfs-localpv:
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
      zfs:
        # Talos installs ZFS at a non-standard path
        bin: /usr/local/sbin/zfs
      zfsController:
        replicas: 1
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            memory: 128Mi
      zfsNode:
        # /home is read-only on Talos; use a writable path under /var
        encrKeysDir: /var/local/openebs/keys
        resources:
          requests:
            cpu: 89m
            memory: 167Mi
          limits:
            memory: 167Mi
        nodeDriverRegistrar:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 32Mi
    loki:
      enabled: false
    lvm-localpv:
      enabled: false
    mayastor:
      enabled: false
    minio:
      enabled: false
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false
          keep: false
    preUpgradeHook:
      enabled: false
