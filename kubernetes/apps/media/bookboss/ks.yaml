---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bookboss
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: bookboss
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: volsync
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/media/bookboss/app"
  postBuild:
    substitute:
      APP: bookboss
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
