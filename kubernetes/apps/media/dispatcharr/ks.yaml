---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dispatcharr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: dispatcharr
  components:
    - ../../../../components/gpu
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: intel-gpu-resource-driver
      namespace: kube-system
    - name: kopiur
      namespace: system
  interval: 1h
  path: "./kubernetes/apps/media/dispatcharr/app"
  postBuild:
    substitute:
      APP: dispatcharr
      KOPIUR_CAPACITY: 10Gi
      KOPIUR_MOVER_UID: "1000"
      KOPIUR_MOVER_GID: "1000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
