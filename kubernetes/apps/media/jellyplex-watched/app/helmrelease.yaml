---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyplex-watched
spec:
  chartRef:
    kind: OCIRepository
    name: jellyplex-watched
  interval: 30m
  values:
    controllers:
      jellyplex-watched:
        type: cronjob
        cronjob:
          schedule: "5 * * * *"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 0
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
        containers:
          app:
            image:
              repository: ghcr.io/luigi311/jellyplex-watched
              tag: 8.5.1@sha256:e7d37b649ba8c92eca16f9f4a97e0c3ceabf326bd9f1dbe59cd44f13d2875afd
            env:
              DRYRUN: false
              DEBUG_LEVEL: "DEBUG"
              EMBY_BASEURL: http://emby.media.svc.cluster.local:8096
              EMBY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: jellyplex-watched-secret
                    key: emby_api_key
              JELLYFIN_BASEURL: http://jellyfin.media.svc.cluster.local:8096
              JELLYFIN_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: jellyplex-watched-secret
                    key: jellyfin_api_key
              LOG_FILE: /tmp/jellyplex-watched.log
              MARK_FILE: /tmp/jellyplex-watched.mark.log
              RUN_ONLY_ONCE: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          jellyplex-watched:
            app:
              - path: /tmp
                subPath: tmp
