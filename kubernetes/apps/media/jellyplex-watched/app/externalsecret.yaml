---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellyplex-watched
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: jellyplex-watched-secret
    creationPolicy: Owner
  data:
    - secretKey: jellyfin_api_key
      remoteRef:
        key: jellyfin
        property: api_key_jellyplex_watch
    - secretKey: emby_api_key
      remoteRef:
        key: emby
        property: api_key_jellyplex_watch
