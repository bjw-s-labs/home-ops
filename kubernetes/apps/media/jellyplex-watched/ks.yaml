---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyplex-watched
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: jellyplex-watched
  interval: 1h
  path: "./kubernetes/apps/media/jellyplex-watched/app"
  postBuild:
    substitute:
      APP: jellyfin
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
