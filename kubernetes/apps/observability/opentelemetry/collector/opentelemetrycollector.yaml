---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: k8s-events
spec:
  image: otel/opentelemetry-collector-contrib:0.152.0
  config:
    receivers:
      k8s_events:
        auth_type: serviceAccount
    processors:
      batch:
        timeout: 10s
      filter:
        logs:
          exclude:
            match_type: regexp
            resource_attributes:
              - key: k8s.namespace.name
                value: ^(kube-system|kube-public|kube-node-lease)$
      groupbyattrs:
        keys:
          - k8s.event.reason
          - k8s.object.name
          - k8s.namespace.name
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
    exporters:
      otlphttp/vlogs:
        logs_endpoint: http://victoria-logs-server.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
    service:
      pipelines:
        logs/events:
          receivers:
            - k8s_events
          processors:
            - memory_limiter
            - filter
            - groupbyattrs
            - batch
          exporters:
            - otlphttp/vlogs
---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: k8s-logs
spec:
  image: otel/opentelemetry-collector-contrib:0.152.0
  mode: daemonset
  env:
    - name: KUBE_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/observability_k8s-logs-collector-*/*/*.log
        include_file_path: true
        start_at: end
        operators:
          - type: container
    processors:
      batch:
        timeout: 10s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.node.name
        filter:
          node_from_env_var: KUBE_NODE_NAME
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
    exporters:
      otlphttp/vlogs:
        logs_endpoint: http://victoria-logs-server.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
    service:
      pipelines:
        logs:
          receivers:
            - filelog
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlphttp/vlogs
