---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    privateKeySecretRef:
      name: letsencrypt-staging
    profile: shortlived
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          webhook:
            groupName: acme.bjw-s.dev
            solverName: ovh
            config:
              endpoint: ovh-eu
              authenticationMethod: application
              applicationKeyRef:
                key: applicationKey
                name: ovh-issuer-secret
              applicationSecretRef:
                key: applicationSecret
                name: ovh-issuer-secret
              applicationConsumerKeyRef:
                key: consumerKey
                name: ovh-issuer-secret
        selector:
          dnsZones:
            - bjw-s.dev
---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
