---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: publish-k8s-schemas
spec:
  chartRef:
    kind: OCIRepository
    name: publish-k8s-schemas
  interval: 30m
  values:
    controllers:
      publish-k8s-schemas:
        type: cronjob
        cronjob:
          backoffLimit: 4
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          schedule: "0 */4 * * *"
          successfulJobsHistory: 1
        pod:
          restartPolicy: OnFailure
          securityContext:
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
        initContainers:
          generate-schemas:
            image:
              repository: ghcr.io/bjw-s-labs/k8s-crd-extractor
              tag: 2026.3.11@sha256:a26844ff81905a8fac4dba61b416bed087a1944e20e38634acba5a7f65eeac93
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: alpine/git
              tag: v2.52.0
            env:
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: publish-k8s-schemas-secret
                    key: GITHUB_TOKEN
              GIT_REPO: github.com/bjw-s-labs/CRD-catalog.git
              GIT_AUTHOR_NAME:
                value: &git_author github-actions[bot]
              GIT_AUTHOR_EMAIL:
                value: &git_author_email github-actions[bot]@users.noreply.github.com
              GIT_COMMITTER_NAME:
                value: *git_author
              GIT_COMMITTER_EMAIL:
                value: *git_author_email
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                export HOME=/tmp
                git clone --depth=1 \
                  "https://x-access-token:${GITHUB_TOKEN}@${GIT_REPO}" \
                  /tmp/repo
                mkdir -p /tmp/repo/schemas
                cp -r /data/crdSchemas/. /tmp/repo/schemas/
                cd /tmp/repo
                git add .
                if git diff --cached --quiet; then
                  echo "No changes to commit"
                  exit 0
                fi
                git commit -m "chore: update CRD schemas ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
                git push
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          publish-k8s-schemas:
            generate-schemas:
              - path: /config/.datree
                subPath: data
              - path: /tmp
                subPath: tmp
            app:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp
    serviceAccount:
      publish-k8s-schemas: {}
    rbac:
      roles:
        publish-k8s-schemas:
          type: ClusterRole
          rules:
            - apiGroups:
                - apiextensions.k8s.io
              resources:
                - customresourcedefinitions
                - customresourcedefinitions/status
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - apiregistration.k8s.io
              resources:
                - apiservices
                - apiservices/status
              verbs:
                - get
                - list
                - watch
      bindings:
        publish-k8s-schemas:
          type: ClusterRoleBinding
          roleRef:
            identifier: publish-k8s-schemas
          subjects:
            - identifier: publish-k8s-schemas
