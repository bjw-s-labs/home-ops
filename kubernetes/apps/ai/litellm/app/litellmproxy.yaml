---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmproxy_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: litellm
spec:
  # renovate: datasource=docker depName=ghcr.io/berriai/litellm
  image: ghcr.io/berriai/litellm:v1.91.2@sha256:f46d672e9d12a84e5dde046ff3865e0bf323e49f9f9b8eb08cd33c1713ea9627
  replicas: 1
  generalSettings:
    health_check_endpoint: /v1/health
  routerSettings:
    routing_strategy: simple-shuffle
    redis_host: os.environ/REDIS_HOST
    redis_port: os.environ/REDIS_PORT
    num_retries: 3
    timeout: 600
    context_window_fallbacks:
      - neuralwatt/qwen3.6-35b-fast: ["neuralwatt/kimi-k2.6-fast", "neuralwatt/glm-5.2-fast"]
      - neuralwatt/qwen3.6-35b: ["neuralwatt/kimi-k2.6", "neuralwatt/glm-5.2"]
      - neuralwatt/qwen3.5-397b-fast: ["neuralwatt/glm-5.2-fast"]
      - neuralwatt/qwen3.5-397b: ["neuralwatt/glm-5.2"]
      - neuralwatt/glm-5.2-short-fast: ["neuralwatt/glm-5.2-fast"]
      - neuralwatt/glm-5.2-short: ["neuralwatt/glm-5.2"]
      - neuralwatt/kimi-k2.6-fast: ["neuralwatt/glm-5.2-fast"]
      - neuralwatt/kimi-k2.6: ["neuralwatt/glm-5.2"]
      - neuralwatt/kimi-k2.7-code: ["neuralwatt/glm-5.2"]
  litellmSettings:
    success_callback:
      - prometheus
    prometheus_adapter: true
    cache: true
    cache_params:
      type: redis
      host: os.environ/REDIS_HOST
      port: os.environ/REDIS_PORT
    drop_params: true
    merge_reasoning_content_in_choices: true
  env:
    - name: LITELLM_LOG
      value: INFO
    - name: LITELLM_MODE
      value: PRODUCTION
    - name: REDIS_HOST
      value: litellm-dragonfly.ai.svc.cluster.local
    - name: REDIS_PORT
      value: "6379"
    - name: LITELLM_MASTER_KEY
      valueFrom:
        secretKeyRef:
          name: litellm
          key: LITELLM_MASTER_KEY
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  service:
    type: ClusterIP
    port: 4000
  route:
    hostnames:
      - litellm.bjw-s.dev
    parentRefs:
      - name: envoy-external
        namespace: network
