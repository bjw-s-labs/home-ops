---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmodel_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMModel
metadata:
  name: neuralwatt-qwen3-5-397b-fast
spec:
  modelName: neuralwatt/qwen3.5-397b-fast
  params:
    model: openai/qwen3.5-397b-fast
    apiBase: https://api.neuralwatt.com/v1
    apiKeyRef:
      name: litellm
      key: NEURALWATT_API_KEY
    dropParams: true
    additional:
      temperature: 0.7
  info:
    maxInputTokens: 262128
    maxOutputTokens: 32768
    supportsFunctionCalling: true
    supportsPromptCaching: true
