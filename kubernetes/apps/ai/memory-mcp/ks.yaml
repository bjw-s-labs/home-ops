---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: memory-mcp
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: memory-mcp
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: toolhive-operator-crds
      namespace: ai
  interval: 1h
  path: "./kubernetes/apps/ai/memory-mcp/app"
  postBuild:
    substitute:
      APP: memory-mcp
      APP_UID: "65534"
      APP_GID: "65533"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
