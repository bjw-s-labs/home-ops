---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-reranker-0.6b
spec:
  source: https://huggingface.co/Voodisss/Qwen3-Reranker-0.6B-GGUF-llama_cpp/resolve/main/Qwen3-Reranker-0.6B-Q4_K_M.gguf
  format: gguf
  quantization: Q4_K_M
  hardware:
    accelerator: cpu
    gpu:
      enabled: false
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-reranker-0.6b
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-reranker-0.6b
  image: ghcr.io/ggml-org/llama.cpp:server
  replicas: 1
  priority: batch
  parallelSlots: 4
  contextSize: 8192
  batchSize: 8192
  uBatchSize: 2048
  extraArgs:
    - --reranking
    - --pooling
    - rank
    - --embedding
  resources:
    cpu: 100m
    memory: 2Gi
  endpoint:
    port: 8080
    type: ClusterIP
