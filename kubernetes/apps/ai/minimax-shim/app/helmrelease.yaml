---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minimax-shim
spec:
  chartRef:
    kind: OCIRepository
    name: minimax-shim
  interval: 30m
  values:
    controllers:
      minimax-shim:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: RollingUpdate
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: registry.erwanleboucher.dev/eleboucher/minimax-shim
              tag: 0.0.1@sha256:e817106edd5a8aa54733aa111e4d8858e7a8cfd0dc0a8896b12f7e84edcb79cf
            env:
              ADDR: ":8080"
              PUBLIC_URL: http://localhost:8080
              MEDIA_DIR: /data/minimax-media
              VIDEO_TIMEOUT: 20m
              MINIMAX_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: minimax-shim-secret
                    key: MINIMAX_API_KEY
              SHIM_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: minimax-shim-secret
                    key: SHIM_API_KEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      media:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: miroir-local
        globalMounts:
          - path: /data/minimax-media
    service:
      app:
        ports:
          http:
            port: 8080
