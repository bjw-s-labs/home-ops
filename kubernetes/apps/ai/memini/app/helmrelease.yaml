---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 30m
  values:
    controllers:
      main:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          main:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: MEMINI_API_KEY
              MEMINI_BACKEND: sqlite
              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_DEDUP_SIMILARITY: "0.80"
              MEMINI_SHORT_TERM_CAP: "300"
              MEMINI_DEMOTE_AFTER: 1440h
              MEMINI_EMBED_BASE_URL: http://qwen3-embedding-0-6b.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: qwen3-embedding
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_MAX_CONCURRENCY: "2"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_LOG_FORMAT: json
              MEMINI_LLM_API: openai
              MEMINI_LLM_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              MEMINI_LLM_MODEL: neuralwatt/qwen3.6-35b-fast
              MEMINI_LLM_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: LITELLM_API_KEY
              MEMINI_RECALL_EMBED_TIMEOUT: "10s"
              MEMINI_TOMBSTONE_TTL: 720h
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini-secret
                    key: MEMINI_API_KEY
    persistence:
      data:
        existingClaim: memini
    route:
      ui:
        enabled: true
        annotations:
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - memini.bjw-s.dev
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: llm
