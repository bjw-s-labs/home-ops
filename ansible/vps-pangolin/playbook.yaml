---
- name: Bootstrap pangolin VPS
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: auto_silent
    pangolin_hostname: pangolin.bjw-s.dev
    pangolin_org_id: homelab
    pangolin_org_name: Homelab
    pangolin_site_name: k8s-cluster
    pangolin_org_subnet: 100.89.0.0/16
    pangolin_org_utility_subnet: 100.90.0.0/24

  tasks:
    - name: Check host connectivity
      ansible.builtin.ping:

    - name: Read secrets from 1Password
      ansible.builtin.shell: "op read 'op://{{ item.key }}' < /dev/null"
      delegate_to: localhost
      become: false
      loop:
        - key: Shared/c6itdbmw5gdslnnep2vfihhu54/Service accounts/doco-cd
          var: doco_1pw_sa_token
        - key: Services/Pangolin/username
          var: pangolin_admin_email
        - key: Services/Pangolin/password
          var: pangolin_admin_password
        - key: Services/Pangolin/crowdsec_traefik_api_key
          var: crowdsec_traefik_api_key
      check_mode: false
      changed_when: false
      no_log: true
      register: secrets_raw

    - name: Set secret facts
      ansible.builtin.set_fact:
        doco_1pw_sa_token: "{{ secrets_raw.results[0].stdout }}"
        pangolin_admin_email: "{{ secrets_raw.results[1].stdout }}"
        pangolin_admin_password: "{{ secrets_raw.results[2].stdout }}"
        crowdsec_traefik_api_key: "{{ secrets_raw.results[3].stdout }}"
      no_log: true

    - name: packages
      block:
        - name: packages | Install Docker
          ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
          args:
            executable: /bin/bash
            creates: /usr/bin/docker

    - name: ssh
      block:
        - name: ssh | Harden sshd_config
          ansible.builtin.copy:
            dest: /etc/ssh/sshd_config.d/01-hardening.conf
            content: |
              PermitRootLogin no
              PasswordAuthentication no
              MaxAuthTries 3
              LoginGraceTime 20
            owner: root
            group: root
            mode: "0644"
          notify: Restart ssh.socket

    - name: firewall
      block:
        - name: "firewall | Allow ports"
          community.general.ufw:
            rule: allow
            port: "{{ item.port }}"
            proto: "{{ item.protocol | default('tcp') }}"
          loop:
            - name: SSH
              port: 22
            - name: HTTP
              port: 80
            - name: HTTPS
              port: 443
            - name: Wireguard
              port: 51820
              protocol: udp
            - name: Gerbil
              port: 21820
              protocol: udp

        - name: firewall | Enable UFW
          community.general.ufw:
            state: enabled
            policy: deny

    - name: doco-cd
      vars:
        dococd_config_dir: /opt/doco-cd
      block:
        - name: doco-cd | Create directory
          ansible.builtin.file:
            path: "{{ dococd_config_dir }}"
            state: directory
            owner: ubuntu
            group: ubuntu
            mode: "0755"

        - name: doco-cd | Copy docker-compose app file
          ansible.builtin.copy:
            src: ../../docker/vps-pangolin/.doco-cd/docker-compose.app.yaml
            dest: "{{ dococd_config_dir }}/docker-compose.yaml"
            owner: ubuntu
            group: ubuntu
            mode: "0644"
          register: compose_file

        - name: doco-cd | Create secrets
          ansible.builtin.copy:
            dest: "{{ dococd_config_dir }}/{{ item.name }}"
            content: |
              {{ item.content }}
            owner: ubuntu
            group: ubuntu
            mode: "0600"
          no_log: true
          loop:
            - name: 1pw_token
              content: "{{ doco_1pw_sa_token }}"

        - name: doco-cd | Run docker-compose
          community.docker.docker_compose_v2:
            project_src: "{{ dococd_config_dir }}"
            files:
              - docker-compose.yaml
            pull: always
            state: present
          when: not ansible_check_mode

        - name: doco-cd | Wait for healthy
          community.docker.docker_container_info:
            name: doco-cd
          register: dococd_info
          until: dococd_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 10
          when: not ansible_check_mode

    - name: pangolin
      block:
        - name: pangolin | Wait for healthy
          community.docker.docker_container_info:
            name: pangolin
          register: pangolin_info
          until: pangolin_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 10
          when: not ansible_check_mode

        - name: pangolin | set admin credentials
          community.docker.docker_container_exec:
            container: pangolin
            command: >
              node /app/dist/cli.mjs set-admin-credentials
              --email "{{ pangolin_admin_email }}"
              --password "{{ pangolin_admin_password }}"
          changed_when: false

        - name: Bootstrap Pangolin org and site
          ansible.builtin.shell: |
            docker exec -i pangolin node - << 'JSEOF'
            const http = require('http');

            const BASE = 'http://localhost:3000/api/v1';
            const CSRF = 'x-csrf-protection';
            let cookie = '';

            function api(method, path, body) {
              return new Promise((resolve, reject) => {
                const data = body ? JSON.stringify(body) : null;
                const opts = {
                  hostname: 'localhost', port: 3000,
                  path: '/api/v1' + path, method,
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': CSRF,
                    ...(cookie ? { Cookie: cookie } : {})
                  }
                };
                const req = http.request(opts, res => {
                  const sc = res.headers['set-cookie'];
                  if (sc) cookie = sc.map(c => c.split(';')[0]).join('; ');
                  let buf = '';
                  res.on('data', d => buf += d);
                  res.on('end', () => resolve(JSON.parse(buf)));
                });
                req.on('error', reject);
                if (data) req.write(data);
                req.end();
              });
            }

            async function main() {
              // Login
              let r = await api('POST', '/auth/login',
                { email: '{{ pangolin_admin_email }}', password: '{{ pangolin_admin_password }}' });
              if (!r.success) { console.log('LOGIN_FAILED: ' + r.message); process.exit(1); }

              // Create org (idempotent)
              r = await api('PUT', '/org', {
                orgId: '{{ pangolin_org_id }}', name: '{{ pangolin_org_name }}',
                subnet: '{{ pangolin_org_subnet }}', utilitySubnet: '{{ pangolin_org_utility_subnet }}'
              });
              if (!r.success && !r.message.includes('already exists')) {
                console.log('ORG_FAILED: ' + r.message); process.exit(1);
              }

              // Check if site already exists
              const sites = await api('GET', '/org/{{ pangolin_org_id }}/sites');
              const existing = (sites.data?.sites || []).find(s => s.name === '{{ pangolin_site_name }}');
              if (existing) { console.log('SITE_EXISTS:' + existing.niceId); process.exit(0); }

              // Pick site defaults
              const defaults = await api('GET', '/org/{{ pangolin_org_id }}/pick-site-defaults');
              if (!defaults.success) { console.log('DEFAULTS_FAILED: ' + defaults.message); process.exit(1); }

              const newtId = defaults.data.newtId;
              const newtSecret = defaults.data.newtSecret;

              // Create site
              r = await api('PUT', '/org/{{ pangolin_org_id }}/site', {
                name: '{{ pangolin_site_name }}', type: 'newt',
                newtId, secret: newtSecret
              });
              if (!r.success) { console.log('SITE_FAILED: ' + r.message); process.exit(1); }

              console.log('NEWT_ID:' + newtId);
              console.log('NEWT_SECRET:' + newtSecret);
              console.log('SITE_NICE_ID:' + r.data.niceId);
            }

            main().catch(e => { console.log('ERROR: ' + e.message); process.exit(1); });
            JSEOF
          args:
            executable: /bin/bash
          register: pangolin_bootstrap

        - name: Parse bootstrap output
          ansible.builtin.set_fact:
            newt_id: "{{ (pangolin_bootstrap.stdout | regex_search('NEWT_ID:(.+)', '\\1') or ['']) | first }}"
            newt_secret: "{{ (pangolin_bootstrap.stdout | regex_search('NEWT_SECRET:(.+)', '\\1') or ['']) | first }}"
            site_nice_id: "{{ (pangolin_bootstrap.stdout | regex_search('SITE_(?:NICE_ID|EXISTS):(.+)', '\\1') or ['']) | first }}"

        - name: Fail if bootstrap returned an error
          ansible.builtin.fail:
            msg: "{{ pangolin_bootstrap.stdout }}"
          when: "'_FAILED:' in pangolin_bootstrap.stdout"

        - name: Save Newt credentials to 1Password
          ansible.builtin.shell: >
            op item edit Pangolin --vault services
            "newt_id={{ newt_id }}"
            "newt_secret={{ newt_secret }}"
            "newt_site_niceid={{ site_nice_id }}"
            "website=https://{{ pangolin_hostname }}"
            "hostname=https://{{ pangolin_hostname }}" < /dev/null
          delegate_to: localhost
          become: false
          changed_when: false
          when: newt_id != ""

    - name: crowdsec
      block:
        - name: crowdsec | Wait for healthy
          community.docker.docker_container_info:
            name: crowdsec
          register: crowdsec_info
          until: crowdsec_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 10
          when: not ansible_check_mode

        - name: crowdsec | Get bouncers
          community.docker.docker_container_exec:
            container: crowdsec
            command: >
              cscli bouncers list -o json
          register: crowdsec_bouncers
          changed_when: false

        - name: crowdsec | Register bouncer for Traefik
          community.docker.docker_container_exec:
            container: crowdsec
            command: >
              cscli bouncers add traefik --key "{{ crowdsec_traefik_api_key }}"
          when: "'traefik' not in crowdsec_bouncers.stdout"

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "=== Bootstrap complete ==="
          - "VPS IP      : {{ inventory_hostname }}"
          - "Dashboard   : https://{{ pangolin_hostname }}"
          - "Org         : {{ pangolin_org_id }}"
          - "Site niceId : {{ site_nice_id }}"
          - "Newt ID     : {{ newt_id if newt_id != '' else '(already existed)' }}"
          - ""
          - "Credentials saved to 1Password item 'Services/Pangolin'."
          - ""
          - "Next: update the site niceId in kubernetes/apps/network/newt/app/helmrelease.yaml"
          - "  site: {{ site_nice_id }}"

  handlers:
    - name: Restart ssh.socket
      ansible.builtin.service:
        name: ssh.socket
        state: restarted
