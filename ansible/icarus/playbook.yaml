---
- name: Bootstrap pangolin VPS
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: auto_silent
    host_ssh_port: 22222

  tasks:
    - name: Check host connectivity
      ansible.builtin.ping:

    - name: "update hostnames"
      hostname:
        name: icarus

    - name: Read secrets from 1Password
      ansible.builtin.shell: "op read 'op://{{ item.key }}' < /dev/null"
      delegate_to: localhost
      become: false
      loop:
        - key: Shared/c6itdbmw5gdslnnep2vfihhu54/Service accounts/doco-cd
          var: doco_1pw_sa_token
        - key: automation/doco-cd/api_secret
          var: doco_api_secret
        - key: automation/doco-cd/webhook_secret
          var: doco_webhook_secret
        - key: Automation/crowdsec/api_token
          var: crowdsec_api_key
      check_mode: false
      changed_when: false
      no_log: true
      register: secrets_raw

    - name: Set secret facts
      ansible.builtin.set_fact:
        doco_1pw_sa_token: "{{ secrets_raw.results[0].stdout }}"
        doco_api_secret: "{{ secrets_raw.results[1].stdout }}"
        doco_webhook_secret: "{{ secrets_raw.results[2].stdout }}"
        crowdsec_api_key: "{{ secrets_raw.results[3].stdout }}"
      no_log: true

    - name: packages
      block:
        - name: packages | Install Docker
          ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
          args:
            executable: /bin/bash
            creates: /usr/bin/docker

        - name: packages | Install ufw
          ansible.builtin.apt:
            name: ufw
            state: present
            update_cache: false

    - name: ssh
      block:
        - name: ssh | Update ssh socket config
          ansible.builtin.replace:
            path: /lib/systemd/system/ssh.socket
            regexp: "^(ListenStream=.+):\\d+$"
            replace: "\\1:{{ host_ssh_port }}"
          notify:
            - Reload systemd daemon
            - Restart ssh.socket

        - name: ssh | Harden sshd_config
          ansible.builtin.copy:
            dest: /etc/ssh/sshd_config.d/01-hardening.conf
            content: |
              PermitRootLogin no
              PasswordAuthentication no
              MaxAuthTries 3
              LoginGraceTime 20
            owner: root
            group: root
            mode: "0644"
          notify: Restart ssh.socket

    - name: firewall
      block:
        - name: firewall | Allow ports
          community.general.ufw:
            rule: allow
            port: "{{ item.port }}"
            proto: "{{ item.protocol | default('tcp') }}"
          loop:
            - name: SSH
              port: 22
            - name: Host SSH
              port: "{{ host_ssh_port }}"
            - name: HTTP
              port: 80
            - name: HTTPS
              port: 443
            - name: Rathole control
              port: 2333

        - name: firewall | Enable UFW
          community.general.ufw:
            state: enabled
            policy: deny

    - name: docker
      block:
        - name: docker | Create edge docker network
          community.docker.docker_network:
            name: edge
            driver: bridge
            state: present

    - name: towonel
      vars:
        towonel_config_dir: /opt/towonel
      block:
        - name: towonel | Create directory
          ansible.builtin.file:
            path: "{{ towonel_config_dir }}"
            state: directory
            owner: 10001
            group: 10001
            mode: "0755"

    - name: doco-cd
      vars:
        dococd_config_dir: /opt/doco-cd
      block:
        - name: doco-cd | Create directory
          ansible.builtin.file:
            path: "{{ dococd_config_dir }}"
            state: directory
            owner: ubuntu
            group: ubuntu
            mode: "0755"

        - name: doco-cd | Copy docker-compose app file
          ansible.builtin.copy:
            src: ../../docker/icarus/.doco-cd/docker-compose.app.yaml
            dest: "{{ dococd_config_dir }}/docker-compose.yaml"
            owner: ubuntu
            group: ubuntu
            mode: "0644"
          register: compose_file

        - name: doco-cd | Create secrets
          ansible.builtin.copy:
            dest: "{{ dococd_config_dir }}/{{ item.name }}"
            content: |
              {{ item.content }}
            owner: ubuntu
            group: ubuntu
            mode: "0600"
          no_log: true
          loop:
            - name: 1pw_token
              content: "{{ doco_1pw_sa_token }}"
            - name: api_secret
              content: "{{ doco_api_secret }}"
            - name: webhook_secret
              content: "{{ doco_webhook_secret }}"

        - name: doco-cd | Run docker-compose
          community.docker.docker_compose_v2:
            project_src: "{{ dococd_config_dir }}"
            files:
              - docker-compose.yaml
            pull: always
            state: present
          when: not ansible_check_mode

        - name: doco-cd | Wait for healthy
          community.docker.docker_container_info:
            name: doco-cd
          register: dococd_info
          until: dococd_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 10
          when: not ansible_check_mode

    - name: crowdsec
      block:
        - name: crowdsec | Wait for LAPI on loopback
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: 8088
            timeout: 180

        - name: crowdsec | Register firewall bouncer (idempotent)
          ansible.builtin.shell: |
            set -e
            if docker exec crowdsec cscli bouncers list -o json | jq -e '.[] | select(.name=="firewall")' >/dev/null; then
              echo "ALREADY_REGISTERED"
            else
              docker exec crowdsec cscli bouncers add firewall --key "{{ crowdsec_api_key }}"
            fi
          register: bouncer_reg
          changed_when: "'ALREADY_REGISTERED' not in bouncer_reg.stdout"

        - name: crowdsec | Register CAPI (community blocklist)
          ansible.builtin.shell: |
            docker exec crowdsec cscli capi status >/dev/null 2>&1 \
              || docker exec crowdsec cscli capi register
          register: capi_reg
          changed_when: "'Successfully' in capi_reg.stdout"

        - name: crowdsec | Ensure /etc/apt/keyrings exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: crowdsec | Download apt signing key
          ansible.builtin.get_url:
            url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
            dest: /etc/apt/keyrings/crowdsec.asc
            mode: "0644"

        - name: crowdsec | Add apt repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.asc] https://packagecloud.io/crowdsec/crowdsec/any any main"
            filename: crowdsec
            state: present
            update_cache: true

        - name: crowdsec | Install host firewall bouncer
          ansible.builtin.apt:
            name: crowdsec-firewall-bouncer-iptables
            state: present

        - name: crowdsec | Render bouncer config
          ansible.builtin.template:
            src: crowdsec-firewall-bouncer.yaml.j2
            dest: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
            owner: root
            group: root
            mode: "0600"
          notify: Restart crowdsec-firewall-bouncer

        - name: crowdsec | Enable + start bouncer
          ansible.builtin.systemd:
            name: crowdsec-firewall-bouncer
            enabled: true
            state: started

        - name: crowdsec | Verify bouncer is active
          ansible.builtin.command: systemctl is-active crowdsec-firewall-bouncer
          changed_when: false

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart ssh.socket
      ansible.builtin.service:
        name: ssh.socket
        state: restarted

    - name: Restart crowdsec-firewall-bouncer
      ansible.builtin.service:
        name: crowdsec-firewall-bouncer
        state: restarted
