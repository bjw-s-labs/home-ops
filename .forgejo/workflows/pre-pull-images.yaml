---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |-
            kubernetes/**/*

  extract-images:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Extract Images
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    outputs:
      images: ${{ steps.extract-images.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@2df8349356dd1b40a56be5bce8bc4b2b4a951962 # 0.1.38
        with:
          token: ""

      - name: Extract Images
        id: extract-images
        env:
          FLATE_OUTPUT: json
          FLATE_PATH: ./kubernetes/flux/cluster
        run: |
          images=$(flate diff images)

          echo "Images to pull:"
          echo "${images}" | yq --prettyPrint

          # Ensure matrix is never empty to prevent Forgejo from blocking downstream jobs
          if [ "${images}" = "[]" ]; then
              images='["__skip__"]'
          fi

          echo "images=${images}" >> "${FORGEJO_OUTPUT}"

  image-pull:
    name: Image Pull
    runs-on: docker
    needs:
      - extract-images
    strategy:
      matrix:
        image: ${{ fromJSON(needs.extract-images.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    env:
      MATRIX_IMAGE: ${{ matrix.image }}
    steps:
      - name: Try to pull Image
        run: |
          if [ "${MATRIX_IMAGE}" = "__skip__" ]; then
              echo "No new images to pull"
              exit 0
          fi
          docker pull "${MATRIX_IMAGE}"

  image-pull-success:
    needs:
      - image-pull
    if: ${{ !cancelled() }}
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
