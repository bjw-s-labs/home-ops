---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |-
            kubernetes/**/*

  flate:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Flate
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    env:
      FLATE_PATH: ./kubernetes/flux/cluster
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@cb51c417b0ff69e73e0569fdb4f95defd9efa90f # v0.4.1
        with:
          token: ""

      - name: Run flate test
        run: flate test all --base ${{ forgejo.event.repository.default_branch }}

      - name: Run flate diff
        id: diff
        run: |-
          diff=$(flate diff all)
          echo "Changes:"
          echo "${diff}"
          {
            echo 'diff<<EOF'
            echo "${diff}"
            echo 'EOF'
          } >> "${FORGEJO_OUTPUT}"

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          MARKER: "<!-- sticky-comment: flate -->"
          HEADER: "Changes:"
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
        run: |-
          DIFF_LENGTH=${#DIFF_CONTENT}

          if [[ ${DIFF_LENGTH} -gt 60000 ]]; then
            RUN_URL="${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
            BODY=$(printf $'%%s\n<details open>\n  <summary>%s (%%d chars — too large to post)</summary>\n\nDiff exceeds size limit. View the [workflow run](%%s) for full output.</details>' \
              "${MARKER}" "${HEADER}" "${DIFF_LENGTH}" "${RUN_URL}")
          else
            BODY=$(printf $'%s\n<details open>\n  <summary>%s</summary>\n\n```diff\n%s\n```\n\n</details>' \
              "${MARKER}" "${HEADER}" "${DIFF_CONTENT}")
          fi

          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi
