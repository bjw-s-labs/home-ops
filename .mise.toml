[env]
JUST_UNSTABLE = "1"
FLATE_PATH = '{{config_root}}/kubernetes/flux/cluster'
KUBECONFIG = '{{config_root}}/kubeconfig'
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = '{{config_root}}/talosconfig'

[settings]
pipx.uvx = true

[tools]
"aqua:astral-sh/uv" = "latest"
"aqua:google/yamlfmt" = "latest"
"aqua:rhysd/actionlint" = "latest"
"github:home-operations/flate" = "latest"
"pipx:ansible" = "latest"
"pipx:ansible-core" = "latest"

[hooks]
postinstall = "ansible-galaxy install -r {{config_root}}/ansible/requirements.yaml"
